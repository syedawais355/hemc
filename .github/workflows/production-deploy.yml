name: Deploy to Production (hemc.pk)

# Deploys to the Vercel "medicines" project (production domain hemc.pk)
# whenever code lands on main (push or merged PR). Manual runs allowed too.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two production deploys at once; newest wins.
concurrency:
  group: production-deploy
  cancel-in-progress: true

# Project identifiers (not secrets). Only VERCEL_TOKEN is a repo secret.
env:
  VERCEL_ORG_ID: team_tV087xPgTFsOGoLTp3XHi69t
  VERCEL_PROJECT_ID: prj_JjHVE7Ko8z3ZdXBPSTZu4zw1tho7

jobs:
  deploy:
    name: Build & deploy to hemc.pk
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build (production)
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
